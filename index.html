<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MATA — Choisir un outil</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#0c0f14;--surface:#161b24;--surface2:#1e2533;--border:#2a3244;--text:#e8ecf1;--text-muted:#7a8599;--primary:#3b82f6;--primary-glow:rgba(59,130,246,.25);--gradient:linear-gradient(135deg,#3b82f6,#8b5cf6)}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:3rem 1.5rem}
    body::before{content:'';position:fixed;top:-40%;left:-20%;width:80vw;height:80vw;background:radial-gradient(ellipse,rgba(59,130,246,.06) 0%,transparent 70%);pointer-events:none}
    body::after{content:'';position:fixed;bottom:-30%;right:-15%;width:60vw;height:60vw;background:radial-gradient(ellipse,rgba(139,92,246,.05) 0%,transparent 70%);pointer-events:none}
    .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2.5rem;max-width:720px;margin:0 auto}
    .badge{display:inline-block;font-size:.7rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--primary);background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.2);padding:.35rem 1rem;border-radius:999px;margin-bottom:1.2rem}
    h1{font-family:'Playfair Display',serif;font-size:clamp(1.75rem,4vw,2.5rem);font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.6rem}
    p{color:var(--text-muted);font-size:1rem;margin-bottom:1rem;line-height:1.6}
    ul{padding-left:1.5rem;line-height:2.2}
    .card a{color:var(--primary);text-decoration:none;transition:color .2s}
    .card a:hover{color:#60a5fa}
    #logoutLink{font-size:.9rem;color:var(--text-muted);display:inline-block;margin-bottom:1.25rem}
    #logoutLink:hover{color:var(--text)}
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">MATA GROUP SA</div>
    <h1>Choisir un outil</h1>
    <p>Cliquez sur un fichier HTML :</p>
    <p><a href="#" id="logoutLink">Déconnexion</a></p>

    <ul>
      <li><a href="./BRS_Generator_MATA.html">BRS Generator — MATA</a></li>
      <li><a href="./Reconciliation_matix_mata_bictorys.html">Reconciliation Ventes, Bictorys, Cash, Virement, Creances et Remboursement</a></li>
      <li><a href="./mata_perration_ana.html">Mata — Analyse Perration</a></li>
      <!-- Ajoutez d’autres liens ici -->
    </ul>
  </div>
  <script src="auth-guard.js"></script>
  <script>
    document.getElementById('logoutLink').onclick = function(e) {
      e.preventDefault();
      sessionStorage.removeItem('brs_authenticated');
      window.location.href = 'login.html';
    };
  </script>
</body>
</html>
