<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — MATA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect fill='%233b82f6' width='32' height='32' rx='6'/></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0f14;
      --surface: #161b24;
      --surface2: #1e2533;
      --border: #2a3244;
      --text: #e8ecf1;
      --text-muted: #7a8599;
      --primary: #3b82f6;
      --primary-glow: rgba(59, 130, 246, 0.25);
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    body::before {
      content: '';
      position: fixed;
      top: -40%;
      left: -20%;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(ellipse, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .badge {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--primary);
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      padding: 0.35rem 1rem;
      border-radius: 999px;
      margin-bottom: 1.2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 700;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.75rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-glow);
    }
    input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }
    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }
    .error-msg.visible { display: block; }
    .btn-login {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: var(--gradient);
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px var(--primary-glow);
    }
    .btn-login:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="badge">MATA GROUP SA</div>
    <h1>Connexion</h1>
    <p class="subtitle">Identifiez-vous pour accéder aux outils.</p>

    <div class="error-msg" id="errorMsg">Identifiants incorrects. Veuillez réessayer.</div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Utilisateur</label>
        <input type="text" id="username" name="username" placeholder="Nom d'utilisateur" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="Mot de passe" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login">Se connecter</button>
    </form>
  </div>
  <script src="auth-config.js"></script>
  <script>
    if (sessionStorage.getItem('brs_authenticated') === '1') {
      window.location.href = 'index.html';
    }
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      var cfg = window.AUTH_CONFIG || {};
      var user = document.getElementById('username').value;
      var pass = document.getElementById('password').value;
      if (user === cfg.USER && pass === cfg.PASSWORD) {
        sessionStorage.setItem('brs_authenticated', '1');
        window.location.href = 'index.html';
      } else {
        document.getElementById('errorMsg').classList.add('visible');
      }
    };
  </script>
</body>
</html>
